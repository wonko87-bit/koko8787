name: Build APK

on:
  push:
    branches: [ claude/health-monitoring-app-QnDe9 ]
    paths:
      - 'HealthMonitorApp/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.6"

      - name: Build Debug APK
        working-directory: HealthMonitorApp
        run: gradle assembleDebug --no-daemon -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HealthMonitor-debug
          path: HealthMonitorApp/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
