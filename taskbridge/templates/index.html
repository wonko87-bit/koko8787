<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1117" />
  <title>TaskBridge</title>
  <link rel="stylesheet" href="/static/style.css" />
  <!-- PWA manifest placeholder -->
  <link rel="manifest" href="/static/manifest.json" />
</head>
<body>

<div class="app">

  <!-- ===== Header ===== -->
  <header>
    <div class="logo">
      <div class="logo-icon">🔗</div>
      <div>
        TaskBridge
        <div class="logo-sub">Todoist + Google Calendar</div>
      </div>
    </div>

    <div class="auth-badges">
      <a id="badge-google"  href="/auth/google"  class="badge"><span class="dot"></span>Google Cal</a>
      <a id="badge-todoist" href="/auth/todoist" class="badge"><span class="dot"></span>Todoist</a>
    </div>
  </header>

  <!-- ===== Auth setup (hidden once both connected) ===== -->
  <div class="auth-panel" id="auth-panel">
    <h3>🔌 서비스 연결</h3>
    <p>할 일과 일정을 저장하려면 아래 서비스를 먼저 연결해주세요.<br>
       한 번 연결하면 이후에는 바로 사용 가능합니다.</p>
    <div class="auth-btn-row">
      <a id="btn-google"  href="/auth/google"  class="btn-connect">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google Calendar 연결
      </a>
      <a id="btn-todoist" href="/auth/todoist" class="btn-connect">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#db4035">
          <path d="M2.2 4.4C1 4.4 0 5.4 0 6.6v10.8C0 18.6 1 19.6 2.2 19.6h19.6c1.2 0 2.2-1 2.2-2.2V6.6c0-1.2-1-2.2-2.2-2.2H2.2zm3.5 4.8l1.5 1.5 3.5-3.5 1 1-4.5 4.5-2.5-2.5 1-1zm0 5l1.5 1.5 3.5-3.5 1 1-4.5 4.5-2.5-2.5 1-1zm8.8-5h4v1.5h-4V9.2zm0 4.8h4v1.5h-4V14z"/>
        </svg>
        Todoist 연결
      </a>
    </div>
  </div>

  <!-- ===== Main input card ===== -->
  <div class="card">
    <div class="input-area">
      <textarea
        id="input"
        placeholder="내일 오후 3시 치과 예약&#10;보고서 초안 작성&#10;/c 오늘 오후 6시 저녁 약속 (캘린더만)&#10;/t 마트 장보기 (Todoist만)"
        autofocus
      ></textarea>
    </div>

    <!-- Hint chips -->
    <div class="hints">
      <div class="hint" data-prefix="">
        기본 — 둘 다 저장
      </div>
      <div class="hint" data-prefix="/c">
        <code>/c</code> 캘린더만
      </div>
      <div class="hint" data-prefix="/t">
        <code>/t</code> Todoist만
      </div>
    </div>

    <div class="btn-row">
      <div class="target-preview" id="target-preview"></div>
      <button class="submit" id="submit-btn">
        <div class="spinner"></div>
        <span class="btn-label">저장 &nbsp;<kbd style="opacity:.6;font-size:.75em">⌘↵</kbd></span>
      </button>
    </div>
  </div>

  <!-- ===== History ===== -->
  <div id="history-section" style="display:none; display:flex; flex-direction:column; gap:10px;">
    <div class="section-title">최근 저장</div>
    <div class="history-list" id="history-list"></div>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<script src="/static/app.js"></script>
</body>
</html>
